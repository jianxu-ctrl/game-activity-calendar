services:
  activity-calendar:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      FORCE_AUTHN_INNERAPI_DOMAIN: https://calendar.example.com
      FORCE_FRAMEWORK_DISABLE_DATAPASS: "true"
      LOCAL_ACTIVITY_STORE_PATH: /data/game-activities.json
      ADMIN_SYNC_TOKEN: change-this-admin-token
    volumes:
      - activity-calendar-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  activity-calendar-data:
