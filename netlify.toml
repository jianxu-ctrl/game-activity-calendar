[build]
  command = "npm run build:netlify"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/game-activities/sync"
  to = "/.netlify/functions/game-activities-sync"
  status = 200

[[redirects]]
  from = "/api/game-activities"
  to = "/.netlify/functions/game-activities"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
